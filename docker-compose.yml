version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: orderpulse-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: orderpulse
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orderpulse-network

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: orderpulse-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orderpulse-network

  fulfillment-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orderpulse-fulfillment
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: orderpulse
      DB_USER: root
      DB_PASSWORD: root
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - orderpulse-network

volumes:
  mysql-data:

networks:
  orderpulse-network:
    driver: bridge

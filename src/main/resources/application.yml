server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/orderdb?useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:user}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    root: INFO
    com.example.orderprocessor: INFO

app:
  rabbitmq:
    order-exchange: ${APP_RABBITMQ_ORDER_EXCHANGE:order.events}
    order-queue: ${APP_RABBITMQ_ORDER_QUEUE:order.placed.queue}
    order-routing-key: ${APP_RABBITMQ_ORDER_ROUTING_KEY:order.placed}
    processed-routing-key: ${APP_RABBITMQ_PROCESSED_ROUTING_KEY:order.processed}
    dlx-exchange: ${APP_RABBITMQ_DLX_EXCHANGE:dlx.order.events}
    dlq-queue: ${APP_RABBITMQ_DLQ_QUEUE:order.dlq}
  order:
    max-retries: ${APP_ORDER_MAX_RETRIES:3}
